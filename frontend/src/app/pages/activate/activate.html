<div class="min-h-screen bg-gray-950 flex items-center justify-center p-4 relative overflow-hidden">

  <!-- Background glow -->
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] rounded-full opacity-10"
         [ngClass]="{
           'bg-indigo-500': state === 'loading',
           'bg-green-500': state === 'success',
           'bg-red-500': state === 'error'
         }"
         style="filter: blur(120px); transition: background-color 0.8s ease;">
    </div>
  </div>

  <!-- Card -->
  <div class="relative z-10 w-full max-w-md">

    <!-- Logo -->
    <div class="flex justify-center mb-10">
      <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/30">
        <iconify-icon icon="lucide:zap" class="text-white text-xl"></iconify-icon>
      </div>
    </div>

    <!-- LOADING -->
    <div *ngIf="state === 'loading'" class="text-center animate-fade-in">
      <div class="flex justify-center mb-6">
        <div class="w-20 h-20 rounded-full border-2 border-gray-800 flex items-center justify-center">
          <iconify-icon icon="lucide:loader-2" class="text-indigo-400 text-3xl animate-spin"></iconify-icon>
        </div>
      </div>
      <h1 class="text-2xl font-bold text-white mb-2">Активация аккаунта</h1>
      <p class="text-gray-400 text-sm">Проверяем вашу ссылку...</p>
    </div>

    <!-- SUCCESS -->
    <div *ngIf="state === 'success'" class="text-center">
      <!-- Animated checkmark circle -->
      <div class="flex justify-center mb-6">
        <div class="relative w-20 h-20">
          <div class="absolute inset-0 rounded-full bg-green-500/10 animate-ping-slow"></div>
          <div class="relative w-20 h-20 rounded-full bg-green-500/15 border border-green-500/30 flex items-center justify-center">
            <iconify-icon icon="lucide:check" class="text-green-400 text-3xl"></iconify-icon>
          </div>
        </div>
      </div>

      <h1 class="text-2xl font-bold text-white mb-2">Аккаунт активирован!</h1>
      <p class="text-gray-400 text-sm mb-8">
        Ваш аккаунт успешно подтверждён.<br>Добро пожаловать!
      </p>

      <!-- Countdown bar -->
      <div class="mb-6">
        <div class="h-1 w-full bg-gray-800 rounded-full overflow-hidden mb-3">
          <div
            class="h-full bg-green-500 rounded-full"
            [style.width.%]="(countdown / 5) * 100"
            style="transition: width 1s linear;">
          </div>
        </div>
        <p class="text-xs text-gray-500">
          Перенаправление через <span class="text-green-400 font-semibold tabular-nums">{{ countdown }}</span> сек
        </p>
      </div>

      <button
        (click)="goToAuth()"
        class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-xl transition-colors duration-200 flex items-center justify-center gap-2"
      >
        Войти сейчас
        <iconify-icon icon="lucide:arrow-right"></iconify-icon>
      </button>
    </div>

    <!-- ERROR -->
    <div *ngIf="state === 'error'" class="text-center">
      <div class="flex justify-center mb-6">
        <div class="relative w-20 h-20">
          <div class="w-20 h-20 rounded-full bg-red-500/15 border border-red-500/30 flex items-center justify-center">
            <iconify-icon icon="lucide:x" class="text-red-400 text-3xl"></iconify-icon>
          </div>
        </div>
      </div>

      <h1 class="text-2xl font-bold text-white mb-2">Не удалось активировать</h1>
      <p class="text-gray-400 text-sm mb-8">{{ errorMessage }}</p>

      <button
        (click)="goToAuth()"
        class="w-full py-3 bg-gray-800 hover:bg-gray-700 text-white font-semibold rounded-xl transition-colors duration-200 flex items-center justify-center gap-2 border border-gray-700"
      >
        <iconify-icon icon="lucide:arrow-left"></iconify-icon>
        Вернуться к входу
      </button>
    </div>

  </div>
</div>

<style>
  @keyframes ping-slow {
    0% { transform: scale(1); opacity: 0.4; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  .animate-ping-slow {
    animation: ping-slow 1.8s ease-out infinite;
  }
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-fade-in {
    animation: fade-in 0.4s ease-out forwards;
  }
</style>
